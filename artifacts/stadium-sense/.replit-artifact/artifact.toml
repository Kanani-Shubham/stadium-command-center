kind = "web"
previewPath = "/"
title = "StadiumSense AI"
version = "1.0.0"
id = "artifacts/stadium-sense"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22738

[services.development]
run = "pnpm --filter @workspace/stadium-sense run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/stadium-sense", "run", "build" ]
serve = "static"
publicDir = "artifacts/stadium-sense/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22738"
BASE_PATH = "/"
